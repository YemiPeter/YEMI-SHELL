# Primary monitor configuration
#monitor=,preferred,auto,1

# Define the primary modifier key as Super (Windows/Cmd key)
$mod = SUPER

# Yemi Shell Autostarts - Core applications launched at startup
exec-once = quickshell -p $RICE_HOME/quickshell/shell.qml # Panel system
exec-once = systemctl --user start hyprpolkitagent  # Authentication agent
exec-once = systemctl --user start skwd-daemon.service
exec-once = wl-paste --type text --watch cliphist store  # Clipboard history
exec-once = wl-paste --type image --watch cliphist store  # Clipboard history

# Toggle launcher
# Toggle exit menu

source = ~/.config/hypr/modules/decoration.lua
source = ~/.config/hypr/modules/monitors.lua
source = ~/.config/hypr/modules/input.lua
source = ~/.config/hypr/modules/env.lua
source = ~/.config/hypr/modules/autostart.lua
source = ~/.config/hypr/modules/binds.lua
animations {
    enabled = true

    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windowsIn, 1, 4.5, bounce, slide
    animation = windowsOut, 1, 3.5, smooth, slide
    animation = windowsMove, 1, 4, buttery, slide

    animation = fadeIn, 1, 3.5, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 4, smooth
    animation = fadeShadow, 1, 4, smooth

    animation = workspaces, 1, 4.5, buttery, slidefade 10%    
    animation = specialWorkspace, 1, 4.5, buttery, slidefadevert -15%

    animation = border, 1, 7, smooth
    animation = borderangle, 1, 35, linear, loop

    animation = layersIn, 1, 4, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}

misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    # vrr = 1 - Commented out because Intel iGPU VRR implementation is flaky.
    # Cursor movement creates damage events, which trigger VRR refresh rate
    # renegotiation, causing screen flicker.
    # mouse_move_enables_dpms = true - Comment out if screen flickers
    mouse_move_enables_dpms = true
    # key_press_enables_dpms = true - Comment out if screen flickers
    key_press_enables_dpms = true
}

cursor {
    inactive_timeout = 3
}

