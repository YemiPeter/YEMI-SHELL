# =============================================================================
# QuickShell Keybinds
# Auto-generated by Quickshell. Do not edit manually.
# =============================================================================

# =============================================================================
# QuickShell Capture Submap (Disables all normal binds during recording)
# =============================================================================
submap = QuickShell_clean
bind = CTRL, ESCAPE, exec, notify-send 'QuickShell' 'Emergency Exit: Keybinds re-enabled.'
bind = CTRL, ESCAPE, submap, reset
submap = reset

# =============================================================================
# User Defined Bindings
# =============================================================================

# Dashboard
bind = SUPER, D, exec, qs ipc call launcher toggle
bind = CTRL SHIFT, ESCAPE, exec, qs ipc call dashboard-stats toggle
bind = SUPER, Z, exec, qs ipc call wallpaper toggle
bind = SUPER, Q, exec, qs ipc call dashboard-launcher toggle
bind = SUPER, C, exec, qs ipc call dashboard-config toggle

# Popups
bind = SUPER, ESCAPE, exec, qs ipc call exit-toggle toggle
bind = SUPER, N, exec, qs ipc call notification-toggle toggle
bind = SUPER, W, exec, qs ipc call wallpaper-toggle toggle
bind = SUPER, V, exec, qs ipc call clipboard-toggle toggle

# Network Tabs
bind = SUPER ALT, W, exec, qs ipc call wifi-toggle toggle
bind = SUPER ALT, B, exec, qs ipc call bluetooth-toggle toggle
bind = SUPER ALT, G, exec, qs ipc call vpn-toggle toggle
bind = SUPER ALT, H, exec, qs ipc call hotspot-toggle toggle

# Audio Tabs
bind = SUPER, A, exec, qs ipc call audioOut-toggle toggle
bind = SUPER ALT, I, exec, qs ipc call audioIn-toggle toggle
bind = SUPER, M, exec, qs ipc call audioMix-toggle toggle

# Quick Settings
bind = SUPER, B, exec, qs ipc call focus-toggle toggle
bind = ALT, F9, exec, qs ipc call screenrec-on toggle