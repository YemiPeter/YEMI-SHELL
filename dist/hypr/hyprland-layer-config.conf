# Hyprland Layer Shell Configuration for QuickShell
# For Hyprland 0.53+

# Layer shell rules - match:namespace comes LAST
layerrule = blur on, match:namespace ^quickshell
layerrule = ignore_alpha 0.5, match:namespace ^quickshell

# Smooth animations for layer surfaces
animation = layersIn, 1, 4, default, popin 80%
animation = layersOut, 1, 3, default, popin 80%